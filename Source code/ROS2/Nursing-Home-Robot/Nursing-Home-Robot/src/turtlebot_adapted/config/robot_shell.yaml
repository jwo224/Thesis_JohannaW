robot_shell_spawner:
  ros__parameters:
    shell_name: "nursing_home_robot_shell"

    # Shell size in meters
    shell_length: 0.65
    shell_width: 0.50
    shell_height: 0.45

    # Position offset relative to TurtleBot odom pose
    offset_x: 0.0
    offset_y: 0.0
    offset_z: 0.25

    # RGBA color
    color_r: 0.2
    color_g: 1.0
    color_b: 0.2
    color_a: 0.75

    # How often the visual shell follows the robot
    update_rate_hz: 20.0
